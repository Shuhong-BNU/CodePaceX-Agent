id: codepacex_002_config_validation
name: Config validation
fixture: mini_config_app
prompt: >
  Fix the failing config validation tests. The provider loader should reject
  a non-list models value and reject empty model names inside models. Change
  implementation code only and run the relevant pytest file.
execution:
  permission_mode: acceptEdits
  timeout_seconds: 420
graders:
  - type: command
    command: ["{python}", "-m", "pytest", "-q", "tests/test_config_validation.py"]
    timeout_seconds: 120
  - type: file_state
    expected_changed:
      - "mini_config/config.py"
    forbidden_changed:
      - "tests/**"
      - ".codepacex/permissions.yaml"
