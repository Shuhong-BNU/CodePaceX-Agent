name: Evaluation V2 Control Canary

on:
  pull_request:
    paths:
      - ".github/workflows/evaluation-v2-control-canary.yml"
      - "evals/evaluation_v2/control_canary.py"
      - "evals/evaluation_v2/control_canary_payloads/**"
      - "tests/test_evaluation_v2_control_canary.py"
  workflow_dispatch:
    inputs:
      paid_execution:
        description: Reserved for a separately authorized future runner; this phase only permits false.
        required: true
        default: false
        type: boolean
      expected_freeze_sha256:
        description: Exact SHA-256 of the Freeze produced on main.
        required: false
        default: ''
        type: string
      approved_hard_cap_cny:
        description: Must be the frozen CNY 15.000000 hard cap.
        required: false
        default: '15.000000'
        type: string
      authorization_acknowledgement:
        description: One-time authorization acknowledgement recorded in the fresh ledger.
        required: false
        default: ''
        type: string
      run_id:
        description: Fresh, caller-selected paid Control Canary Run ID.
        required: false
        default: ''
        type: string

permissions:
  contents: read

jobs:
  zero-provider-preflight:
    if: ${{ github.event_name == 'pull_request' || inputs.paid_execution == false }}
    runs-on: ubuntu-22.04
    timeout-minutes: 180
    env:
      EVALUATOR_COMMIT: ad79b850f15e33992e96f03f6e97f05ddf9aa0be
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.sha || github.sha }}
      - name: Resolve remote main ref for release readiness
        run: |
          set -euo pipefail
          git fetch --no-tags --depth=1 origin +refs/heads/main:refs/remotes/origin/main
          git rev-parse --verify refs/remotes/origin/main^{commit}
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Prepare fresh V2 artifact directories
        run: |
          set -euo pipefail
          root="$RUNNER_TEMP/evaluation-v2-control-canary/$GITHUB_RUN_ID"
          mkdir -p "$root"
          printf 'CANARY_ROOT=%s\n' "$root" >> "$GITHUB_ENV"
      - name: Install project and frozen official evaluator
        run: |
          set -euo pipefail
          docker info >/dev/null
          python -m pip install -e . pytest pytest-asyncio
          evaluator_root="$RUNNER_TEMP/swe-bench-live"
          git clone --filter=blob:none https://github.com/microsoft/SWE-bench-Live.git "$evaluator_root"
          git -C "$evaluator_root" checkout --detach "$EVALUATOR_COMMIT"
          test "$(git -C "$evaluator_root" rev-parse HEAD)" = "$EVALUATOR_COMMIT"
          python -m pip install -e "$evaluator_root"
      - name: Freeze and validate V2 Control Canary
        run: |
          set -euo pipefail
          python -m evals.evaluation_v2.control_canary freeze --root . --output "$CANARY_ROOT/freeze" > "$CANARY_ROOT/freeze-result.json"
          python -m evals.evaluation_v2.control_canary validate --root . --freeze "$CANARY_ROOT/freeze" > "$CANARY_ROOT/freeze-validation.json"
      - name: Run two-task environment preflight without Provider transport
        run: |
          set -euo pipefail
          python -m evals.evaluation_v2.control_canary preflight --freeze "$CANARY_ROOT/freeze" --artifact-root "$CANARY_ROOT/preflight" > "$CANARY_ROOT/preflight-result.json"
      - name: Rehearse rolling reservations without Provider transport
        run: |
          set -euo pipefail
          python -m evals.evaluation_v2.control_canary rehearse --root . --freeze "$CANARY_ROOT/freeze" --preflight-summary "$CANARY_ROOT/preflight/preflight-summary.json" --artifact-root "$CANARY_ROOT/rehearsal" > "$CANARY_ROOT/rehearsal-result.json"
          python - "$CANARY_ROOT/preflight/preflight-summary.json" "$CANARY_ROOT/rehearsal/paid-path-rehearsal.json" <<'PY'
          import json, sys
          preflight = json.load(open(sys.argv[1], encoding='utf-8'))
          rehearsal = json.load(open(sys.argv[2], encoding='utf-8'))
          assert preflight['passed'] is True
          assert all(item['environment_blocker'] is None and item['meaningful_test_executed'] for item in preflight['tasks'])
          assert rehearsal['provider_requests'] == rehearsal['usage'] == 0
          assert rehearsal['charge_cny'] == '0'
          assert rehearsal['settlements'] == 2 and rehearsal['active_reservation'] is None
          assert rehearsal['provider_secret_read'] is False
          PY
      - name: Run deterministic two-task paid-path shadow without Provider transport
        run: |
          set -euo pipefail
          python -m evals.evaluation_v2.control_canary shadow --root . --freeze "$CANARY_ROOT/freeze" --preflight-summary "$CANARY_ROOT/preflight/preflight-summary.json" --artifact-root "$CANARY_ROOT/shadow" --run-id "shadow-$GITHUB_RUN_ID" > "$CANARY_ROOT/shadow-result.json"
          python -m evals.evaluation_v2.control_canary summary --artifact-root "$CANARY_ROOT/shadow" > "$CANARY_ROOT/shadow-summary-result.json"
          python - "$CANARY_ROOT/shadow/shadow-canary-summary.json" "$CANARY_ROOT/shadow/canary-result-summary.json" <<'PY'
          import json, sys
          shadow, summary = (json.load(open(path, encoding='utf-8')) for path in sys.argv[1:])
          assert shadow['paid_execution'] is False
          assert shadow['provider_requests'] == shadow['usage'] == 0
          assert shadow['charge_cny'] == '0' and shadow['provider_secret_read'] is False
          assert shadow['simulated_provider_requests'] == 2 and shadow['active_reservation'] is None
          assert [item['terminal_status'] for item in shadow['results']] == ['unresolved', 'resolved']
          assert summary['candidate_count'] == summary['scorable_count'] == 2
          assert summary['v2_2_gate']['status'] == 'V2_2_DIAGNOSTIC_PILOT_GO'
          PY
      - name: Compile release readiness check without dispatching paid execution
        run: |
          set -euo pipefail
          python -m evals.evaluation_v2.control_canary release-check --root . --freeze "$CANARY_ROOT/freeze" --preflight-summary "$CANARY_ROOT/preflight/preflight-summary.json" --ledger "$CANARY_ROOT/shadow/ledger.json" --output "$CANARY_ROOT/release-check.json" > "$CANARY_ROOT/release-check-result.json"
      - name: Upload Control Canary evidence
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: evaluation-v2-control-canary-preflight-${{ github.run_id }}
          path: ${{ runner.temp }}/evaluation-v2-control-canary/${{ github.run_id }}
          if-no-files-found: warn

  paid-execution:
    if: ${{ github.event_name == 'workflow_dispatch' && inputs.paid_execution == true && github.ref == 'refs/heads/main' }}
    runs-on: ubuntu-22.04
    timeout-minutes: 360
    env:
      EVALUATOR_COMMIT: ad79b850f15e33992e96f03f6e97f05ddf9aa0be
      BAILIAN_API_KEY: ${{ secrets.BAILIAN_API_KEY }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Install project and frozen official evaluator
        run: |
          set -euo pipefail
          docker info >/dev/null
          python -m pip install -e . pytest pytest-asyncio
          evaluator_root="$RUNNER_TEMP/swe-bench-live"
          git clone --filter=blob:none https://github.com/microsoft/SWE-bench-Live.git "$evaluator_root"
          git -C "$evaluator_root" checkout --detach "$EVALUATOR_COMMIT"
          test "$(git -C "$evaluator_root" rev-parse HEAD)" = "$EVALUATOR_COMMIT"
          python -m pip install -e "$evaluator_root"
      - name: Run the explicit paid Control Canary
        run: |
          set -euo pipefail
          root="$RUNNER_TEMP/evaluation-v2-control-canary-paid/${{ inputs.run_id }}"
          mkdir -p "$root"
          python -m evals.evaluation_v2.control_canary freeze --root . --output "$root/freeze" > "$root/freeze-result.json"
          python -m evals.evaluation_v2.control_canary preflight --freeze "$root/freeze" --artifact-root "$root/preflight" > "$root/preflight-result.json"
          python -m evals.evaluation_v2.control_canary paid-run --confirm-paid-execution --root . --freeze "$root/freeze" --artifact-root "$root/paid" --expected-freeze-sha256 '${{ inputs.expected_freeze_sha256 }}' --approved-hard-cap-cny '${{ inputs.approved_hard_cap_cny }}' --authorization-acknowledgement '${{ inputs.authorization_acknowledgement }}' --run-id '${{ inputs.run_id }}' > "$root/paid-result.json"
      - name: Upload paid Control Canary evidence
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: evaluation-v2-control-canary-paid-${{ inputs.run_id }}-${{ github.run_id }}
          path: ${{ runner.temp }}/evaluation-v2-control-canary-paid/${{ inputs.run_id }}
          if-no-files-found: warn
